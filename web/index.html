<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pity-IA | Inteligencia Conversacional</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/app.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-wrap">
        <a href="#" class="brand" aria-label="Pity-IA Home">
          <span class="brand-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M4 12C4 7.582 7.582 4 12 4C16.418 4 20 7.582 20 12C20 16.418 16.418 20 12 20" />
              <path d="M12 8V12L15 15" />
            </svg>
          </span>
          <span class="brand-text">Pity-IA</span>
        </a>
        <h1 id="assistantTitle">Assistente Inteligente</h1>
        <div class="lang" aria-label="Selecionar idioma">
          <button id="ptBtn" class="active" type="button">PT</button>
          <button id="enBtn" type="button">EN</button>
        </div>
      </div>
    </header>

    <main class="chat-main">
      <section class="chat-frame glass" aria-label="Conversa Pity-IA">
        <section id="chat" class="chat" aria-live="polite"></section>
      </section>
    </main>

    <section class="composer-shell">
      <form id="chatForm" class="composer container glass">
        <input
          id="prompt"
          name="prompt"
          placeholder="Digite sua pergunta..."
          autocomplete="off"
          required
        />
        <button id="micBtn" class="icon-btn" type="button" aria-label="Ativar entrada por voz">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M12 4C10.343 4 9 5.343 9 7V12C9 13.657 10.343 15 12 15C13.657 15 15 13.657 15 12V7C15 5.343 13.657 4 12 4Z" />
            <path d="M5 11.5C5 15.366 8.134 18.5 12 18.5C15.866 18.5 19 15.366 19 11.5" />
            <path d="M12 18.5V21" />
          </svg>
          <span>Voz</span>
        </button>
        <button id="clearBtn" class="icon-btn clear-btn" type="button" aria-label="Limpar conversa">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M4 7H20" />
            <path d="M9 7V5C9 4.448 9.448 4 10 4H14C14.552 4 15 4.448 15 5V7" />
            <path d="M8 7L9 19C9.046 19.552 9.508 20 10.062 20H13.938C14.492 20 14.954 19.552 15 19L16 7" />
            <path d="M10 11V17" />
            <path d="M14 11V17" />
          </svg>
          <span>Limpar</span>
        </button>
        <button id="sendBtn" class="send-btn" type="submit" aria-label="Enviar mensagem">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M4 12L20 4L13 20L10 13L4 12Z" />
          </svg>
          <span>Enviar</span>
        </button>
      </form>
      <p id="speechStatus" class="speech-status container" aria-live="polite"></p>
    </section>

    <footer class="site-footer">
      <div class="container footer-content">
        <p>2026 Pity-IA. Design e IA por Leandro Timoteo Software Engineering.</p>
      </div>
    </footer>
    <script src="/static/app.js"></script>
  </body>
</html>
